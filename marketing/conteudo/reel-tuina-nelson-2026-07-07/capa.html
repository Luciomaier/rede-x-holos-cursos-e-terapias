<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@700;800;900&family=Parisienne&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #1A0A2E;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }

  /* Overlay gradiente — transparente até ~68%, opaco em ~90% */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(46, 8, 66, 0) 0%,
      rgba(46, 8, 66, 0) 55%,
      rgba(46, 8, 66, 0.15) 65%,
      rgba(46, 8, 66, 0.72) 78%,
      rgba(46, 8, 66, 1) 90%,
      rgba(46, 8, 66, 1) 100%
    );
  }

  /* Faixa no topo — vinheta suave pra suavizar borda */
  .overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0; height: 280px;
    background: linear-gradient(to bottom, rgba(46,8,66,0.45) 0%, rgba(46,8,66,0) 100%);
  }

  /* Header */
  .header {
    position: absolute;
    top: 56px; left: 72px; right: 72px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .logo-wrap {
    background: rgba(255,255,255,0.92);
    padding: 8px 15px; border-radius: 10px;
  }
  .logo-wrap img { height: 50px; width: auto; display: block; }

  /* Badge "Ao Vivo na Aula" */
  .badge-live {
    display: flex; align-items: center; gap: 10px;
    background: rgba(230,160,40,0.18);
    border: 1.5px solid rgba(230,160,40,0.6);
    color: #E6A028;
    font-family: 'Inter', sans-serif;
    font-weight: 800; font-size: 20px;
    letter-spacing: 0.20em; text-transform: uppercase;
    padding: 11px 26px; border-radius: 40px;
  }
  .dot-live {
    width: 10px; height: 10px; border-radius: 50%;
    background: #E6A028; flex-shrink: 0;
  }

  /* Content block — bottom */
  .content {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    padding: 0 76px 80px;
    z-index: 10;
  }

  .prof-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: 0.30em; text-transform: uppercase;
    color: rgba(255,255,255,0.50);
    margin-bottom: 18px;
  }

  .titulo-linha1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 900; font-size: 112px;
    line-height: 0.95; letter-spacing: -0.04em;
    color: #FFFFFF;
    display: block;
  }

  .titulo-cursiva {
    font-family: 'Parisienne', cursive;
    font-size: 128px; line-height: 1.05;
    color: #E6A028;
    display: block;
    margin-bottom: 28px;
  }

  .regua {
    width: 72px; height: 4px;
    background: #E6A028; border-radius: 2px;
    margin-bottom: 28px;
  }

  .subtitulo {
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 32px;
    line-height: 1.45;
    color: rgba(255,255,255,0.72);
    margin-bottom: 48px;
  }

  .handle {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 26px;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>

<div class="slide">
  <img class="bg-photo" src="aula.png" alt="Aula Tui-ná">
  <div class="overlay-top"></div>
  <div class="overlay"></div>

  <!-- Header -->
  <div class="header">
    <div class="logo-wrap"><img src="logo.png" alt="Holos"></div>
    <div class="badge-live"><span class="dot-live"></span>Aula Real</div>
  </div>

  <!-- Content -->
  <div class="content">
    <p class="prof-label">Prof. Nelson</p>
    <span class="titulo-linha1">Massagem</span>
    <span class="titulo-cursiva">Tui-ná</span>
    <div class="regua"></div>
    <p class="subtitulo">manobras feitas<br>em aula de verdade</p>
    <p class="handle">@holos_cursos</p>
  </div>
</div>

</body>
</html>
