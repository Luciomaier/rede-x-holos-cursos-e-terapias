<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@700;800;900&family=Parisienne&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #1A0A2E;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Toque roxo suave pra unir a foto à identidade da marca */
  .overlay-brand {
    position: absolute;
    inset: 0;
    background: rgba(46, 8, 66, 0.12);
  }

  /* Vinheta no topo */
  .overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0; height: 340px;
    background: linear-gradient(to bottom, rgba(26,10,46,0.62) 0%, rgba(26,10,46,0) 100%);
  }

  /* Gradiente escuro na base pra legibilidade — curva suave */
  .overlay-bottom {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26, 10, 46, 0) 0%,
      rgba(26, 10, 46, 0) 46%,
      rgba(26, 10, 46, 0.22) 57%,
      rgba(26, 10, 46, 0.70) 70%,
      rgba(26, 10, 46, 0.93) 81%,
      rgba(26, 10, 46, 1) 90%,
      rgba(26, 10, 46, 1) 100%
    );
  }

  /* Header */
  .header {
    position: absolute;
    top: 64px; left: 72px; right: 72px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }

  .badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(230, 160, 40, 0.16);
    border: 1.5px solid rgba(230, 160, 40, 0.65);
    color: #E6A028;
    font-family: 'Inter', sans-serif;
    font-weight: 800; font-size: 20px;
    letter-spacing: 0.20em; text-transform: uppercase;
    padding: 11px 26px; border-radius: 40px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #E6A028; flex-shrink: 0;
  }

  .handle {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 26px;
    letter-spacing: 0.03em;
    color: rgba(255, 255, 255, 0.65);
  }

  /* Content block — fundo */
  .content {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 0 76px 96px;
    z-index: 10;
  }

  .eyebrow {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: #E6A028;
    margin-bottom: 24px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-weight: 900; font-size: 90px;
    line-height: 1.02; letter-spacing: -0.03em;
    color: #FFFFFF;
    margin-bottom: 38px;
  }

  .headline .cursive {
    font-family: 'Parisienne', cursive;
    font-weight: 400;
    font-size: 132px;
    line-height: 0.9;
    color: #E6A028;
    letter-spacing: 0;
    display: inline-block;
    vertical-align: -0.06em;
  }

  .regua {
    width: 72px; height: 4px;
    background: #E6A028; border-radius: 2px;
    margin-bottom: 34px;
  }

  .cta {
    display: flex; align-items: center; gap: 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 30px;
    color: rgba(255, 255, 255, 0.72);
  }

  .play-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 50%;
    font-size: 15px;
    padding-left: 3px;
  }
</style>
</head>
<body>
<div class="slide">
  <img class="bg-photo" src="foto.png" alt="Shiatsu">
  <div class="overlay-brand"></div>
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <!-- Header -->
  <div class="header">
    <div class="badge"><span class="dot"></span>Shiatsu</div>
    <span class="handle">@holos_cursos</span>
  </div>

  <!-- Content -->
  <div class="content">
    <span class="eyebrow">A técnica por trás do toque</span>
    <p class="headline">Você acha que shiatsu é <span class="cursive">força?</span></p>
    <div class="regua"></div>
    <div class="cta"><span class="play-btn">▶</span>Assista e descubra</div>
  </div>
</div>
</body>
</html>
