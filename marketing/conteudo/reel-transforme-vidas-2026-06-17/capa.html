<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; overflow: hidden; background: #3E0E55; }

    .slide {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
    }

    .bg-foto {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1920px;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(62, 14, 85, 0.00)  0%,
        rgba(62, 14, 85, 0.00) 38%,
        rgba(62, 14, 85, 0.50) 54%,
        rgba(62, 14, 85, 0.88) 65%,
        rgba(62, 14, 85, 1.00) 73%,
        rgba(62, 14, 85, 1.00) 100%
      );
    }

    .logo-circulo {
      position: absolute;
      top: 38px;
      left: 40px;
      width: 140px;
      height: 140px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-circulo img {
      width: 96px;
      height: auto;
    }

    .badge {
      position: absolute;
      top: 1080px;
      left: 56px;
      background: #E6A028;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 38px;
      border-radius: 8px;
    }

    .texto-bloco {
      position: absolute;
      bottom: 110px;
      left: 56px;
      right: 56px;
    }

    .titulo {
      font-family: 'Poppins', sans-serif;
      font-size: 86px;
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.025em;
      color: #ffffff;
    }

    .destaque {
      color: #E6A028;
    }

    .regua {
      width: 72px;
      height: 5px;
      background: #E6A028;
      border-radius: 3px;
      margin: 30px 0 44px;
    }

    .rodape {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .handle {
      font-family: 'Inter', sans-serif;
      font-size: 30px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.01em;
    }

    .coracao {
      font-size: 38px;
      line-height: 1;
    }
  </style>
</head>
<body>
<div class="slide">
  <img class="bg-foto" src="foto2-1080.png" width="1080" height="1920" alt="">
  <div class="overlay"></div>

  <div class="logo-circulo">
    <img src="/identidade/logo/logo-original.png" alt="Holos"
         onerror="this.src='/identidade/logo/logo-sem-fundo.png'">
  </div>

  <div class="badge">REEL DIÁRIO</div>

  <div class="texto-bloco">
    <div class="titulo">
      Esse dom<br>
      nas suas mãos<br>
      <span class="destaque">não é por acaso.</span>
    </div>
    <div class="regua"></div>
    <div class="rodape">
      <span class="handle">@holos_cursos</span>
      <span class="coracao">💜</span>
    </div>
  </div>
</div>
</body>
</html>
