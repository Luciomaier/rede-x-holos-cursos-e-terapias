<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@700;800;900&family=Parisienne&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: #2E0842;
  }

  .foto-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(46,8,66,0)    0%,
      rgba(46,8,66,0)    70%,
      rgba(46,8,66,0.20) 76%,
      rgba(46,8,66,0.70) 84%,
      rgba(46,8,66,0.95) 90%,
      rgba(46,8,66,1)    94%
    );
  }

  .logo-badge {
    position: absolute;
    top: 64px; left: 64px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: white;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 28px rgba(0,0,0,0.28);
    overflow: hidden;
  }
  .logo-badge img { width: 100px; height: auto; }

  .content {
    position: absolute;
    top: 1240px; left: 0; right: 0; bottom: 0;
    padding: 0 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .badge-pill {
    display: inline-block;
    background: #E6A028;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-weight: 800; font-size: 24px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 40px;
    margin-bottom: 32px;
  }

  .num-destaque {
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: 180px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: #E6A028;
    display: block;
    margin-bottom: 0;
  }

  .titulo {
    font-family: 'Poppins', sans-serif;
    font-weight: 900; font-size: 80px;
    line-height: 1.0; letter-spacing: -0.03em;
    color: #FFFFFF;
    margin-bottom: 4px;
  }

  .cursiva {
    font-family: 'Parisienne', cursive;
    font-size: 92px; line-height: 1.1;
    color: #E6A028; display: block;
    margin-bottom: 28px;
  }

  .regua {
    width: 80px; height: 5px;
    background: #E6A028; border-radius: 3px;
    margin-bottom: 28px;
  }

  .subtitulo {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 34px;
    line-height: 1.4;
    color: rgba(255,255,255,0.80);
    margin-bottom: 40px;
  }

  .footer {
    display: flex; align-items: center;
    justify-content: space-between;
  }
  .handle {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 30px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
  }
  .heart {
    width: 44px; height: 44px;
    background: rgba(109,76,127,0.7);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
</style>
</head>
<body>
<div class="slide">

  <img class="foto-bg" src="bg.png" alt="">
  <div class="overlay"></div>

  <div class="logo-badge">
    <img src="logo.png" alt="Holos">
  </div>

  <div class="content">
    <div>
      <div class="badge-pill">Formação</div>

      <span class="num-destaque">+10</span>
      <h1 class="titulo">técnicas numa</h1>
      <span class="cursiva">grade só.</span>

      <div class="regua"></div>

      <p class="subtitulo">Conheça nossa formação<br>em massoterapia</p>
    </div>

    <div class="footer">
      <span class="handle">@holos_cursos</span>
      <div class="heart">♥</div>
    </div>
  </div>

</div>
</body>
</html>
