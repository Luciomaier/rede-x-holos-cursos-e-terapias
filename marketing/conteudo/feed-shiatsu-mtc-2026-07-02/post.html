<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@700;800;900&family=Parisienne&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #2E0842 0%, #59248F 60%, #3A0B50 100%);
    font-family: 'Inter', sans-serif;
  }

  /* Orbs decorativos */
  .orb {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(230,160,40,0.10);
  }
  .orb1 { width: 700px; height: 700px; top: -200px; right: -200px; }
  .orb2 { width: 480px; height: 480px; top: -100px; right: -100px; border-color: rgba(255,255,255,0.05); }

  /* Logo */
  .logo-badge {
    position: absolute;
    top: 56px; left: 64px;
    background: rgba(255,255,255,0.92);
    padding: 8px 16px;
    border-radius: 12px;
  }
  .logo-badge img { height: 48px; width: auto; display: block; }

  /* Badge aulão */
  .badge-pill {
    display: inline-block;
    background: #E6A028;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: 0.22em; text-transform: uppercase;
    padding: 10px 28px; border-radius: 40px;
    margin-bottom: 28px;
  }

  /* Conteúdo esquerda */
  .content {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 570px;
    padding: 160px 0 72px 64px;
    display: flex; flex-direction: column; justify-content: center;
  }

  .titulo {
    font-family: 'Poppins', sans-serif;
    font-weight: 900; font-size: 68px;
    line-height: 1.0; letter-spacing: -0.03em;
    color: #fff; margin-bottom: 4px;
  }

  .cursiva {
    font-family: 'Parisienne', cursive;
    font-size: 80px; line-height: 1.1;
    color: #E6A028; display: block;
    margin-bottom: 36px;
  }

  .regua {
    width: 64px; height: 4px;
    background: #E6A028; border-radius: 2px;
    margin-bottom: 36px;
  }

  /* Infos do evento */
  .info-list { display: flex; flex-direction: column; gap: 18px; margin-bottom: 44px; }
  .info-item {
    display: flex; align-items: flex-start; gap: 14px;
  }
  .info-icon {
    font-size: 22px; flex-shrink: 0; margin-top: 2px;
  }
  .info-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 26px;
    line-height: 1.3; color: rgba(255,255,255,0.88);
  }
  .info-text span {
    color: #E6A028; font-weight: 800;
  }

  /* Investimento destaque */
  .invest {
    background: rgba(230,160,40,0.15);
    border: 1.5px solid rgba(230,160,40,0.5);
    border-radius: 16px;
    padding: 20px 28px;
    display: inline-block;
    margin-bottom: 44px;
  }
  .invest-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 16px;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.55); margin-bottom: 4px;
  }
  .invest-valor {
    font-family: 'Poppins', sans-serif;
    font-weight: 900; font-size: 52px;
    letter-spacing: -0.02em; color: #E6A028;
    line-height: 1;
  }

  /* Handle */
  .handle {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 24px;
    color: rgba(255,255,255,0.40); letter-spacing: 0.02em;
  }

  /* Foto professor — direita */
  .foto-wrap {
    position: absolute;
    right: 0; bottom: 0;
    width: 540px; height: 900px;
  }
  .foto-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .foto-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to right,
      rgba(46,8,66,1)   0%,
      rgba(46,8,66,0.4) 30%,
      rgba(46,8,66,0)   60%
    );
  }
  .foto-overlay-bottom {
    position: absolute; inset: 0;
    background: linear-gradient(
      to top,
      rgba(46,8,66,1)   0%,
      rgba(46,8,66,0.5) 15%,
      rgba(46,8,66,0)   35%
    );
  }

  /* Nome do professor */
  .prof-nome {
    position: absolute;
    bottom: 72px; right: 48px;
    text-align: right;
  }
  .prof-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 17px;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: #E6A028; margin-bottom: 6px;
  }
  .prof-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 900; font-size: 38px;
    line-height: 1.0; letter-spacing: -0.02em;
    color: #fff;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- Foto prof. Bezerra — direita -->
  <div class="foto-wrap">
    <img src="prof-bezerra.png" alt="Prof. Dermeval Bezerra">
    <div class="foto-overlay"></div>
    <div class="foto-overlay-bottom"></div>
  </div>

  <!-- Logo -->
  <div class="logo-badge">
    <img src="logo.png" alt="Holos">
  </div>

  <!-- Conteúdo -->
  <div class="content">
    <div class="badge-pill">Aulão</div>

    <h1 class="titulo">Shiatsu na</h1>
    <h1 class="titulo">visão da</h1>
    <span class="cursiva">MTC.</span>

    <div class="regua"></div>

    <div class="info-list">
      <div class="info-item">
        <span class="info-icon">📅</span>
        <span class="info-text">Sábado, <span>18 de julho</span></span>
      </div>
      <div class="info-item">
        <span class="info-icon">⏰</span>
        <span class="info-text"><span>09h às 17h</span> · 1 dia</span>
      </div>
      <div class="info-item">
        <span class="info-icon">🔒</span>
        <span class="info-text">Apenas <span>20 vagas</span></span>
      </div>
    </div>

    <div class="invest">
      <p class="invest-label">Investimento</p>
      <p class="invest-valor">R$ 153</p>
    </div>

    <span class="handle">@holos_cursos</span>
  </div>

  <!-- Nome prof -->
  <div class="prof-nome">
    <p class="prof-label">Com o professor</p>
    <p class="prof-title">Dermeval</p>
    <p class="prof-title">Bezerra</p>
  </div>

</div>
</body>
</html>
